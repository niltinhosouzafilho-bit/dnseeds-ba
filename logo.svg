<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <clipPath id="c">
      <circle cx="100" cy="100" r="90"/>
    </clipPath>
  </defs>
  <!-- Outer circle border -->
  <circle cx="100" cy="100" r="92" fill="#d0d0d0"/>
  <!-- White background -->
  <circle cx="100" cy="100" r="90" fill="#ffffff"/>
  <g clip-path="url(#c)">
    <!-- Beige/sand petal — bottom left (smaller, lower) -->
    <path d="M100,125 C85,115 55,110 35,122 C15,138 10,165 10,200 L100,200 Z" fill="#C2B280"/>
    <!-- Dark green leaf — bottom right (larger, extends higher) -->
    <path d="M100,125 C115,100 145,88 170,96 C192,108 195,145 195,200 L100,200 Z" fill="#1A6B4F"/>
    <!-- White vertical separator (only below arcs) -->
    <line x1="100" y1="125" x2="100" y2="200" stroke="#ffffff" stroke-width="5"/>
    <!-- Gold arc 1 — outermost -->
    <path d="M48,122 C48,35 152,35 152,122" fill="none" stroke="#C9A811" stroke-width="12" stroke-linecap="butt"/>
    <!-- Gold arc 2 — middle -->
    <path d="M64,120 C64,50 136,50 136,120" fill="none" stroke="#C9A811" stroke-width="10" stroke-linecap="butt"/>
    <!-- Gold arc 3 — innermost -->
    <path d="M80,118 C80,66 120,66 120,118" fill="none" stroke="#C9A811" stroke-width="8" stroke-linecap="butt"/>
  </g>
</svg>
